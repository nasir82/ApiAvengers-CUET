# Scaling override (Checkpoint 1) - demonstrates horizontal scaling via Docker
# Compose replicas, without any orchestrator.
#
# The API Gateway (port 8000) is the single entry point and load-balances across
# replicas using Docker's built-in DNS round-robin: the gateway resolves each
# service name at request time (see infrastructure/nginx/nginx.conf), so every new
# replica is automatically added to the rotation.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up -d
#   # or scale a specific service on the fly:
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up -d --scale pledge-service=5
#
# Note: the direct host ports (3001-3006) are removed here because multiple
# replicas cannot all bind the same host port. Reach everything through the
# gateway at http://localhost:8000 (or the frontend at http://localhost:3007).
#
# Caveat: pledge/payment run background workers/consumers; running several
# replicas is fine for a load demo, but for strict exactly-once background
# processing you would elect a single worker. Read paths (campaign/user) scale freely.
services:
  campaign-service:
    ports: !reset []
    deploy:
      replicas: 2

  pledge-service:
    ports: !reset []
    deploy:
      replicas: 3

  payment-service:
    ports: !reset []
    deploy:
      replicas: 2

  user-service:
    ports: !reset []
    deploy:
      replicas: 2

  admin-service:
    ports: !reset []
    deploy:
      replicas: 1

  notification-service:
    ports: !reset []
    deploy:
      replicas: 1
