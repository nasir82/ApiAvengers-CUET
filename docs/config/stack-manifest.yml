project: CareForAll
version: 1.0
owner: CUETHACK team

stacks:
  frontend:
    path: frontend
    framework: react-vite
    service_name: frontend
    ports:
      docker: 3007
      dev: 5173
    upstream_gateway: http://localhost:8000

  backend:
    services:
      - name: campaign-service
        port: 3001
      - name: pledge-service
        port: 3002
      - name: payment-service
        port: 3003
      - name: user-service
        port: 3004
      - name: admin-service
        port: 3005
      - name: notification-service
        port: 3006

  infrastructure:
    gateway:
      service: api-gateway
      port: 8000
      rate_limit: 1000r/s
    dependencies:
      - rabbitmq
      - redis

  observability:
    logging:
      - elasticsearch: 9200
      - logstash: 8081
      - kibana: 5601
    metrics:
      - prometheus: 9090
      - grafana: 3000
    tracing:
      - jaeger: 16686

  testing:
    scripts:
      - test-all-apis.ps1
      - test-api.ps1
      - test-services.sh
    postman_collection: CareForAll_API.postman_collection.json

demo_pipeline:
  - docker compose up -d
  - verify health endpoints
  - run test-all-apis.ps1
  - validate observability dashboards
