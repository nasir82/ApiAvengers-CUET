global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'careforall'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Load rules (optional)
# rule_files:
#   - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Campaign Service metrics
  - job_name: 'campaign-service'
    static_configs:
      - targets: ['campaign-service:3001']
    metrics_path: '/metrics'

  # Pledge Service metrics
  - job_name: 'pledge-service'
    static_configs:
      - targets: ['pledge-service:3002']
    metrics_path: '/metrics'

  # Payment Service metrics
  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3003']
    metrics_path: '/metrics'

  # User Service metrics
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3004']
    metrics_path: '/metrics'

  # Admin Service metrics
  - job_name: 'admin-service'
    static_configs:
      - targets: ['admin-service:3005']
    metrics_path: '/metrics'

  # Notification Service metrics
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3006']
    metrics_path: '/metrics'

