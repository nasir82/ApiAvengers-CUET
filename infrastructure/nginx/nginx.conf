events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1000r/s;

    # Use Docker's embedded DNS so upstream hostnames are re-resolved at runtime.
    # Without this, nginx caches each service's container IP at startup and returns
    # 502 after a service is rebuilt/recreated (its IP changes). The variable in
    # proxy_pass forces per-request resolution via this resolver.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Main server
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "API Gateway is healthy\n";
            add_header Content-Type text/plain;
        }

        # Campaign Service routes
        location /api/campaigns {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream campaign-service:3001;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Pledge Service routes
        location /api/pledges {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream pledge-service:3002;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment Service routes
        location /api/payments {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream payment-service:3003;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Webhook routes
        location /api/webhooks {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream payment-service:3003;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User Service routes
        location /api/users {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream user-service:3004;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin Service routes
        location /api/admin {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream admin-service:3005;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notification Service routes
        location /api/notifications {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream notification-service:3006;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default route
        location /api/ {
            limit_req zone=api_limit burst=100 nodelay;
            set $upstream campaign-service:3001;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
