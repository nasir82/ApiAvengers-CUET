events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1000r/s;
    
    # Upstream services
    upstream campaign-service {
        server campaign-service:3001;
    }
    
    upstream pledge-service {
        server pledge-service:3002;
    }
    
    upstream payment-service {
        server payment-service:3003;
    }
    
    upstream user-service {
        server user-service:3004;
    }
    
    upstream admin-service {
        server admin-service:3005;
    }
    
    upstream notification-service {
        server notification-service:3006;
    }
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Main server
    server {
        listen 80;
        server_name localhost;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "API Gateway is healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Campaign Service routes
        location /api/campaigns {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://campaign-service/api/campaigns;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Pledge Service routes
        location /api/pledges {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://pledge-service/api/pledges;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Payment Service routes
        location /api/payments {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://payment-service/api/payments;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Webhook routes
        location /api/webhooks {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://payment-service/api/webhooks;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # User Service routes
        location /api/users {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://user-service/api/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Admin Service routes
        location /api/admin {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://admin-service/api/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Notification Service routes
        location /api/notifications {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://notification-service/api/notifications;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Default route
        location /api/ {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://campaign-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
