input {
  # Accept logs via TCP (services will send logs here)
  tcp {
    port => 5044
    codec => json_lines
  }
  
  # Accept logs via HTTP
  http {
    port => 8080
    codec => json
  }
  
  # Note: External port is 8081, but internal port is still 8080
}

filter {
  # Winston Http transport sends JSON string in event.original
  if [event][original] {
    json {
      source => "[event][original]"
      target => "log_data"
    }
  }
  
  # Extract fields from parsed log data
  if [log_data] {
    mutate {
      # Copy all log_data fields to top level
      add_field => { 
        "log_level" => "%{[log_data][level]}"
        "log_message" => "%{[log_data][message]}"
        "log_service" => "%{[log_data][service]}"
        "log_method" => "%{[log_data][method]}"
        "log_path" => "%{[log_data][path]}"
        "log_status" => "%{[log_data][status]}"
        "log_duration" => "%{[log_data][duration]}"
      }
    }
    
    # Set service_name
    if [log_data][service] {
      mutate {
        replace => { "service_name" => "%{[log_data][service]}" }
      }
    }
    
    # Parse timestamp
    if [log_data][timestamp] {
      date {
        match => [ "[log_data][timestamp]", "yyyy-MM-dd HH:mm:ss" ]
        target => "@timestamp"
      }
    }
    
    # Remove the nested log_data to clean up
    mutate {
      remove_field => [ "log_data" ]
    }
  }
  
  # Fallback: if service is already at top level, use it
  if [service] and ![log_service] {
    mutate {
      add_field => { "service_name" => "%{service}" }
    }
  }
  
  # Parse timestamp if not already parsed
  if [timestamp] and ![log_service] {
    date {
      match => [ "timestamp", "yyyy-MM-dd HH:mm:ss" ]
      target => "@timestamp"
    }
  }
  
  # Clean up duplicate fields
  mutate {
    remove_field => [ "tags" ]
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "careforall-logs-%{+YYYY.MM.dd}"
  }
  
  # Debug output
  stdout {
    codec => rubydebug
  }
}

